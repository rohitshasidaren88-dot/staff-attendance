<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Staff Attendance - Kapten Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dashboard" class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2><i class="fas fa-users"></i> Staff Attendance</h2></div>
            <div class="user-profile-sidebar">
                <div class="user-avatar" id="userAvatar">KP</div>
                <div class="user-name-sidebar" id="userName">Kapten User</div>
                <div class="user-role-sidebar" id="userRole">KAPTEN</div>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item active" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Jadwal Absen Staff</span></div>
                <div class="menu-item" data-page="shift-kapten"><i class="fas fa-user-tie"></i><span>SIFT KAPTEN</span></div>
                <div class="menu-item" data-page="shift-kasir"><i class="fas fa-coins"></i><span>SIFT KASIR</span></div>
            </nav>
            <div class="sidebar-footer"><div class="menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div></div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title" id="pageTitle">Jadwal Absen Staff</h1>
                </div>
                <div class="top-actions">
                    <button class="btn-icon" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-logout" id="logoutTopBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            
            <div id="attendancePage" class="page-content">
                <div class="card"><h3 class="card-title"><i class="fas fa-calendar-check"></i> Rekap Absensi Staff</h3>
                    <div class="table-wrapper"><table id="attendanceTable"><thead>  ox<th>Nama Staff</th><th>Status</th><th>Check-In</th><th>Shift</th><th>Denda</th> </thead><tbody id="attendanceTableBody"></tbody>}</div>
                </div>
            </div>
            
            <div id="shiftKaptenPage" class="page-content" style="display: none;">
                <div class="card"><h3 class="card-title"><i class="fas fa-user-tie"></i> Jadwal SIFT KAPTEN</h3>
                    <div class="date-selector"><label>Periode: </label><input type="date" id="kaptenStartDate" value="2026-03-20"><span> - </span><input type="date" id="kaptenEndDate" value="2026-04-02"><button class="btn-submit" id="updateKaptenSchedule">Update</button></div>
                    <div id="shiftKaptenContainer"></div>
                </div>
            </div>
            
            <div id="shiftKasirPage" class="page-content" style="display: none;">
                <div class="card"><h3 class="card-title"><i class="fas fa-coins"></i> Jadwal SIFT KASIR</h3>
                    <div class="date-selector"><label>Periode: </label><input type="date" id="kasirStartDate" value="2026-03-20"><span> - </span><input type="date" id="kasirEndDate" value="2026-04-02"><button class="btn-submit" id="updateKasirSchedule">Update</button></div>
                    <div id="shiftKasirContainer"></div>
                </div>
            </div>
        </main>
    </div>
    <div class="theme-toggle" id="themeToggleFloat"><i class="fas fa-moon"></i></div>

    <script>
        const staffData = {
            kapten: ["EDOLI MANULLANG","AINI NADIAH","AGIL PRAYETNO","AGUS SUDIANTO","ROBY SUGARA","JULIO YESAYAS NABABAN"],
            kasir: ["PAJAR WIRATAMA SARAGIH","HERRY SYAPUTRA","EFRANTA","ADRIAN PATRIC PRESLY SIMARMATA","SYOFIAH","GRACE ANGGAWAN HUTABARAT","DIXIELIA","KELVIN ADRIAN HRP","MUHAMMAD KHAIRIL","NATASYA NABILA","MUHAMMAD NUR RASYDI","MHD RANGGA PRADINATA","SONIYA","KRISTIN AUDIA SITUMORANG","ABELLIA AMANDA","PUTRI GUSVINA","ADAM DANY PUTRA","FRAYOGA HARIANJA","JENNY SAWITRI","DENNY ANDRIAN","YOGES SUARA","RIDUWAN EFENDI","MELITA","RYAN PERMANA","TENGKU FAREL DAVILA RUSLI","CIPTO","JOKO PURNOMO","KAU SALYA","SOPHEAP VISAL","LEA SREY MEY","CHEA AK RUN"]
        };

        const kaptenShifts = [
            { name: "Shift Pagi", checkIn: "08:00:00", checkOut: "18:00:00" }, { name: "Shift Siang", checkIn: "11:45:00", checkOut: "22:00:00" },
            { name: "Shift Sore 1", checkIn: "14:45:00", checkOut: "02:00:00" }, { name: "Shift Sore 2", checkIn: "15:45:00", checkOut: "02:00:00" },
            { name: "Shift Malam", checkIn: "21:45:00", checkOut: "08:00:00" }
        ];

        const kasirShifts = [
            { checkIn: "07:45:00", checkOut: "18:00:00" }, { checkIn: "09:45:00", checkOut: "20:00:00" }, { checkIn: "11:45:00", checkOut: "22:00:00" },
            { checkIn: "12:45:00", checkOut: "01:00:00" }, { checkIn: "14:45:00", checkOut: "01:00:00" }, { checkIn: "17:45:00", checkOut: "04:00:00" },
            { checkIn: "21:45:00", checkOut: "08:00:00" }, { checkIn: "07:45:00", checkOut: "20:00:00" }, { checkIn: "09:45:00", checkOut: "22:00:00" },
            { checkIn: "11:45:00", checkOut: "00:00:00" }, { checkIn: "12:45:00", checkOut: "01:00:00" }, { checkIn: "17:45:00", checkOut: "06:00:00" },
            { checkIn: "19:45:00", checkOut: "08:00:00" }
        ];

        let attendanceData = {}, fineData = {}, currentUser = null;

        function initData() {
            const stored = localStorage.getItem('attendance_data');
            if(stored) attendanceData = JSON.parse(stored);
            else [...staffData.kapten,...staffData.kasir].forEach(n=>attendanceData[n]={status:'belum',checkInTime:null,shift:null});
            const storedFine = localStorage.getItem('fine_data');
            if(storedFine) fineData = JSON.parse(storedFine);
            else [...staffData.kapten,...staffData.kasir].forEach(n=>fineData[n]={amount:0,paid:false});
            saveData();
        }
        function saveData(){localStorage.setItem('attendance_data',JSON.stringify(attendanceData));localStorage.setItem('fine_data',JSON.stringify(fineData));}
        function checkSession(){const u=JSON.parse(sessionStorage.getItem('currentUser'));if(!u||u.role!=='kapten'){window.location.href='index.html';return;}currentUser=u;document.getElementById('userAvatar').innerHTML=u.fullname.charAt(0).toUpperCase();document.getElementById('userName').innerHTML=u.fullname;document.getElementById('userRole').innerHTML=u.role.toUpperCase();}

        function renderAttendanceTable(){const t=document.getElementById('attendanceTableBody');if(!t)return;t.innerHTML='';[...staffData.kapten,...staffData.kasir].forEach(n=>{const a=attendanceData[n]||{status:'belum',checkInTime:null,shift:null},f=fineData[n]||{amount:0,paid:!1};t.innerHTML+=`<tr><td>${n}</td><td><span class="badge ${a.status==='sudah'?'badge-success':'badge-danger'}">${a.status==='sudah'?'SUDAH ABSEN':'BELUM ABSEN'}</span></td><td>${a.checkInTime||'-'}</td><td>${a.shift||'-'}</td><td><span class="fine-status ${f.paid?'fine-paid':'fine-unpaid'}" onclick="markFinePaid('${n}')">${f.paid?'DONE':`${f.amount} Bath`}</span></td></tr>`;});}

        function renderShiftKapten(){const c=document.getElementById('shiftKaptenContainer');if(!c)return;const sd=document.getElementById('kaptenStartDate').value,ed=document.getElementById('kaptenEndDate').value;let h=`<div class="date-selector"><label>Periode: <strong>${sd} - ${ed}</strong></label></div>`;kaptenShifts.forEach((s,si)=>{const def=staffData.kapten[si%staffData.kapten.length];h+=`<div class="shift-section"><div class="shift-title">${s.name} (${s.checkIn} - ${s.checkOut})</div><table class="shift-table"><thead>  ox<th>NAMA STAFF</th><th>CHECK-IN</th><th>CHECK-OUT</th><th>JADWAL</th> </thead><tbody> <td><select class="kapten-staff">${staffData.kapten.map(n=>`<option value="${n}" ${n===def?'selected':''}>${n}</option>`).join('')}</select></td><td><input type="time" value="${s.checkIn}"></td><td><input type="time" value="${s.checkOut}"></td><td>${s.name}</td> </tbody>}</div>`;});c.innerHTML=h;}
        
        function renderShiftKasir(){const c=document.getElementById('shiftKasirContainer');if(!c)return;const sd=document.getElementById('kasirStartDate').value,ed=document.getElementById('kasirEndDate').value;let h=`<div class="date-selector"><label>Periode: <strong>${sd} - ${ed}</strong></label></div><div class="shift-section"><table class="shift-table"><thead>  ox<th>NAMA STAFF</th><th>CHECK-IN</th><th>CHECK-OUT</th><th>JADWAL</th> </thead><tbody>`;kasirShifts.forEach((s,i)=>{const def=staffData.kasir[i%staffData.kasir.length];h+=`<tr><td><select class="kasir-staff">${staffData.kasir.map(n=>`<option value="${n}" ${n===def?'selected':''}>${n}</option>`).join('')}</select></td><td><input type="time" value="${s.checkIn}"></td><td><input type="time" value="${s.checkOut}"></td><td>Shift ${i+1}</td></tr>`;});h+=`</tbody></table></div>`;c.innerHTML=h;}

        function markFinePaid(n){if(fineData[n]&&!fineData[n].paid){Swal.fire({title:'Konfirmasi',text:`Denda ${fineData[n].amount} Bath untuk ${n} sudah dibayar?`,icon:'question',showCancelButton:!0,confirmButtonText:'Ya, Sudah Dibayar'}).then(r=>{if(r.isConfirmed){fineData[n].paid=!0;saveData();renderAttendanceTable();Swal.fire('Sukses!','Denda telah dibayar','success');}});}}

        function switchPage(p){['attendance','shiftKapten','shiftKasir'].forEach(i=>{const e=document.getElementById(`${i}Page`);if(e)e.style.display=i===p?'block':'none';});const titles={attendance:'Jadwal Absen Staff',shiftKapten:'SIFT KAPTEN',shiftKasir:'SIFT KASIR'};document.getElementById('pageTitle').innerHTML=titles[p]||'Jadwal Absen Staff';if(p==='attendance')renderAttendanceTable();if(p==='shiftKapten')renderShiftKapten();if(p==='shiftKasir')renderShiftKasir();}

        function initTheme(){if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.querySelectorAll('#themeToggle,#themeToggleFloat').forEach(b=>b.innerHTML='<i class="fas fa-sun"></i>');}}
        function toggleTheme(){document.body.classList.toggle('dark');const isDark=document.body.classList.contains('dark');localStorage.setItem('theme',isDark?'dark':'light');const icon=isDark?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>';document.querySelectorAll('#themeToggle,#themeToggleFloat').forEach(b=>b.innerHTML=icon);}
        function logout(){sessionStorage.clear();window.location.href='index.html';}

        function createGlitterParticles(){const s=document.querySelector('.sidebar');if(!s)return;document.querySelectorAll('.glitter-particle').forEach(p=>p.remove());for(let i=0;i<40;i++){const p=document.createElement('div');p.className='glitter-particle';p.style.left=Math.random()*100+'%';p.style.top=Math.random()*100+'%';p.style.width=(Math.random()*3+1)+'px';p.style.height=p.style.width;p.style.animationDelay=Math.random()*8+'s';p.style.animationDuration=(Math.random()*5+5)+'s';s.appendChild(p);}}
        function createCursorNeon(){const c=document.createElement('div');c.className='cursor-neon';document.body.appendChild(c);document.addEventListener('mousemove',(e)=>{c.style.left=e.clientX-15+'px';c.style.top=e.clientY-15+'px';});}

        document.addEventListener('DOMContentLoaded',()=>{checkSession();initData();initTheme();renderAttendanceTable();createCursorNeon();setTimeout(createGlitterParticles,500);
            document.querySelectorAll('.menu-item').forEach(i=>{i.addEventListener('click',()=>{const p=i.getAttribute('data-page');if(p)switchPage(p);document.querySelectorAll('.menu-item').forEach(m=>m.classList.remove('active'));i.classList.add('active');});});
            document.getElementById('logoutBtn')?.addEventListener('click',logout);document.getElementById('logoutTopBtn')?.addEventListener('click',logout);
            document.getElementById('themeToggle')?.addEventListener('click',toggleTheme);document.getElementById('themeToggleFloat')?.addEventListener('click',toggleTheme);
            document.getElementById('updateKaptenSchedule')?.addEventListener('click',renderShiftKapten);document.getElementById('updateKasirSchedule')?.addEventListener('click',renderShiftKasir);
            const mb=document.getElementById('mobileMenuBtn'),sb=document.querySelector('.sidebar');if(mb&&sb)mb.addEventListener('click',()=>sb.classList.toggle('open'));
        });
        window.markFinePaid=markFinePaid;
    </script>
</body>
</html>
