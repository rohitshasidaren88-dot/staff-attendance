<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Staff Attendance - Kapten Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dashboard" class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2><i class="fas fa-users"></i> Staff Attendance</h2></div>
            <div class="user-profile-sidebar">
                <div class="user-avatar" id="userAvatar">KP</div>
                <div class="user-name-sidebar" id="userName">Kapten User</div>
                <div class="user-role-sidebar" id="userRole">KAPTEN</div>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item active" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Jadwal Absen Staff</span></div>
                <div class="menu-item" data-page="shift-kapten"><i class="fas fa-user-tie"></i><span>SIFT KAPTEN</span></div>
                <div class="menu-item" data-page="shift-kasir"><i class="fas fa-coins"></i><span>SIFT KASIR</span></div>
            </nav>
            <div class="sidebar-footer"><div class="menu-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></div></div>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
                    <h1 class="page-title" id="pageTitle">Jadwal Absen Staff</h1>
                </div>
                <div class="top-actions">
                    <button class="btn-icon" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <button class="btn-logout" id="logoutTopBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            
            <div id="attendancePage" class="page-content">
                <div class="card"><h3 class="card-title"><i class="fas fa-calendar-check"></i> Rekap Absensi Staff</h3>
                    <div class="table-wrapper"><table id="attendanceTable"><thead>  <th>Nama Staff</th><th>Status</th><th>Check-In</th><th>Shift</th><th>Denda</th> </thead><tbody id="attendanceTableBody"></tbody>}</div>
                </div>
            </div>
            
            <div id="shiftKaptenPage" class="page-content" style="display: none;">
                <div class="card">
                    <h3 class="card-title"><i class="fas fa-user-tie"></i> Jadwal SIFT KAPTEN</h3>
                    <div class="date-selector">
                        <label>Periode: </label>
                        <input type="date" id="kaptenStartDate" value="2026-03-20">
                        <span> - </span>
                        <input type="date" id="kaptenEndDate" value="2026-04-02">
                        <button class="btn-submit" id="updateKaptenSchedule">Update</button>
                    </div>
                    <div id="shiftKaptenContainer"></div>
                </div>
            </div>
            
            <div id="shiftKasirPage" class="page-content" style="display: none;">
                <div class="card"><h3 class="card-title"><i class="fas fa-coins"></i> Jadwal SIFT KASIR</h3>
                    <div class="date-selector"><label>Periode: </label><input type="date" id="kasirStartDate" value="2026-03-20"><span> - </span><input type="date" id="kasirEndDate" value="2026-04-02"><button class="btn-submit" id="updateKasirSchedule">Update</button></div>
                    <div id="shiftKasirContainer"></div>
                </div>
            </div>
        </main>
    </div>
    <div class="theme-toggle" id="themeToggleFloat"><i class="fas fa-moon"></i></div>

    <script>
        // ==================== DATA STAFF (HANYA KAPTEN & KASIR) ====================
        const staffData = {
            kapten: ["EDOLI MANULLANG","AINI NADIAH","AGIL PRAYETNO","AGUS SUDIANTO","ROBY SUGARA","JULIO YESAYAS NABABAN"],
            kasir: ["PAJAR WIRATAMA SARAGIH","HERRY SYAPUTRA","EFRANTA","ADRIAN PATRIC PRESLY SIMARMATA","SYOFIAH","GRACE ANGGAWAN HUTABARAT","DIXIELIA","KELVIN ADRIAN HRP","MUHAMMAD KHAIRIL","NATASYA NABILA","MUHAMMAD NUR RASYDI","MHD RANGGA PRADINATA","SONIYA","KRISTIN AUDIA SITUMORANG","ABELLIA AMANDA","PUTRI GUSVINA","ADAM DANY PUTRA","FRAYOGA HARIANJA","JENNY SAWITRI","DENNY ANDRIAN","YOGES SUARA","RIDUWAN EFENDI","MELITA","RYAN PERMANA","TENGKU FAREL DAVILA RUSLI","CIPTO","JOKO PURNOMO","KAU SALYA","SOPHEAP VISAL","LEA SREY MEY","CHEA AK RUN"]
        };

        let attendanceData = {};
        let fineData = {};
        let currentUser = null;

        // ==================== FUNGSI DASAR ====================
        function saveData() {
            localStorage.setItem('attendance_data', JSON.stringify(attendanceData));
            localStorage.setItem('fine_data', JSON.stringify(fineData));
        }

        function initData() {
            const stored = localStorage.getItem('attendance_data');
            if (stored) {
                attendanceData = JSON.parse(stored);
            } else {
                const allStaff = [...staffData.kapten, ...staffData.kasir];
                for (let i = 0; i < allStaff.length; i++) {
                    attendanceData[allStaff[i]] = { status: 'belum', checkInTime: null, shift: null };
                }
                saveData();
            }
            
            const storedFine = localStorage.getItem('fine_data');
            if (storedFine) {
                fineData = JSON.parse(storedFine);
            } else {
                const allStaff = [...staffData.kapten, ...staffData.kasir];
                for (let i = 0; i < allStaff.length; i++) {
                    fineData[allStaff[i]] = { amount: 0, paid: false };
                }
                saveData();
            }
        }

        function checkSession() {
            const user = JSON.parse(sessionStorage.getItem('currentUser'));
            if (!user || user.role !== 'kapten') {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            document.getElementById('userAvatar').innerHTML = user.fullname.charAt(0).toUpperCase();
            document.getElementById('userName').innerHTML = user.fullname;
            document.getElementById('userRole').innerHTML = user.role.toUpperCase();
        }

        // ==================== RENDER TABEL ABSENSI ====================
        function renderAttendanceTable() {
            const tbody = document.getElementById('attendanceTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            const allStaff = [...staffData.kapten, ...staffData.kasir];
            for (let i = 0; i < allStaff.length; i++) {
                const name = allStaff[i];
                const att = attendanceData[name] || { status: 'belum', checkInTime: null, shift: null };
                const fine = fineData[name] || { amount: 0, paid: false };
                const statusClass = (att.status === 'sudah') ? 'badge-success' : 'badge-danger';
                const statusText = (att.status === 'sudah') ? 'SUDAH ABSEN' : 'BELUM ABSEN';
                const fineClass = fine.paid ? 'fine-paid' : 'fine-unpaid';
                const fineText = fine.paid ? 'DONE' : fine.amount + ' Bath';
                tbody.innerHTML += '  <td>' + name + '</td><td><span class="badge ' + statusClass + '">' + statusText + '</span></td><td>' + (att.checkInTime || '-') + '</td><td>' + (att.shift || '-') + '</td><td><span class="fine-status ' + fineClass + '" onclick="markFinePaid(\'' + name + '\')">' + fineText + '</span></td>  </tr>';
            }
        }

        // ==================== RENDER SHIFT KAPTEN ====================
        function renderShiftKapten() {
            const container = document.getElementById('shiftKaptenContainer');
            if (!container) return;
            
            const startDate = document.getElementById('kaptenStartDate').value;
            const endDate = document.getElementById('kaptenEndDate').value;
            
            let html = '<div class="date-selector"><label>Periode: <strong>' + startDate + ' - ' + endDate + '</strong></label></div>';
            html += '<div class="shift-section"><div class="shift-title">SIFT KAPTEN</div><table class="shift-table"><thead> <th>NAMA STAFF</th><th>CHECK-IN</th><th>CHECK-OUT</th><th>JADWAL</th> </thead><tbody>';
            
            const kaptenList = [
                { name: "EDOLI MANULLANG", checkIn: "08:00:00", checkOut: "18:00:00", jadwal: "PAGI" },
                { name: "AINI NADIAH", checkIn: "11:45:00", checkOut: "22:00:00", jadwal: "SIANG" },
                { name: "AGIL PRAYETNO", checkIn: "14:45:00", checkOut: "02:00:00", jadwal: "SORE 1" },
                { name: "AGUS SUDIANTO", checkIn: "15:45:00", checkOut: "02:00:00", jadwal: "SORE 2" },
                { name: "ROBY SUGARA", checkIn: "21:45:00", checkOut: "08:00:00", jadwal: "MALAM" },
                { name: "JULIO YESAYAS NABABAN", checkIn: "08:00:00", checkOut: "18:00:00", jadwal: "PAGI" }
            ];
            
            for (let i = 0; i < kaptenList.length; i++) {
                const s = kaptenList[i];
                html += ' <td><select class="kapten-staff">' + staffData.kapten.map(n => `<option value="${n}" ${n === s.name ? 'selected' : ''}>${n}</option>`).join('') + '</select></td>';
                html += '<td><input type="time" value="' + s.checkIn + '"></td>';
                html += '<td><input type="time" value="' + s.checkOut + '"></td>';
                html += '<td>' + s.jadwal + '</td> </tr>';
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        // ==================== RENDER SHIFT KASIR ====================
        function renderShiftKasir() {
            const container = document.getElementById('shiftKasirContainer');
            if (!container) return;
            
            const startDate = document.getElementById('kasirStartDate').value;
            const endDate = document.getElementById('kasirEndDate').value;
            
            let html = '<div class="date-selector"><label>Periode: <strong>' + startDate + ' - ' + endDate + '</strong></label></div>';
            html += '<div class="shift-section"><div class="shift-title">SIFT KASIR</div><table class="shift-table"><thead> <th>NAMA STAFF</th><th>CHECK-IN</th><th>CHECK-OUT</th><th>JADWAL</th> </thead><tbody>';
            
            const kasirList = [
                { name: "PAJAR WIRATAMA SARAGIH", checkIn: "07:45:00", checkOut: "18:00:00", jadwal: "Shift 1" },
                { name: "HERRY SYAPUTRA", checkIn: "09:45:00", checkOut: "20:00:00", jadwal: "Shift 2" },
                { name: "EFRANTA", checkIn: "11:45:00", checkOut: "22:00:00", jadwal: "Shift 3" },
                { name: "ADRIAN PATRIC PRESLY SIMARMATA", checkIn: "12:45:00", checkOut: "01:00:00", jadwal: "Shift 4" },
                { name: "SYOFIAH", checkIn: "14:45:00", checkOut: "01:00:00", jadwal: "Shift 5" },
                { name: "GRACE ANGGAWAN HUTABARAT", checkIn: "17:45:00", checkOut: "04:00:00", jadwal: "Shift 6" },
                { name: "DIXIELIA", checkIn: "21:45:00", checkOut: "08:00:00", jadwal: "Shift 7" },
                { name: "KELVIN ADRIAN HRP", checkIn: "07:45:00", checkOut: "20:00:00", jadwal: "Shift 8" },
                { name: "MUHAMMAD KHAIRIL", checkIn: "09:45:00", checkOut: "22:00:00", jadwal: "Shift 9" },
                { name: "NATASYA NABILA", checkIn: "11:45:00", checkOut: "00:00:00", jadwal: "Shift 10" },
                { name: "MUHAMMAD NUR RASYDI", checkIn: "12:45:00", checkOut: "01:00:00", jadwal: "Shift 11" },
                { name: "MHD RANGGA PRADINATA", checkIn: "17:45:00", checkOut: "06:00:00", jadwal: "Shift 12" },
                { name: "SONIYA", checkIn: "19:45:00", checkOut: "08:00:00", jadwal: "Shift 13" }
            ];
            
            for (let i = 0; i < kasirList.length; i++) {
                const s = kasirList[i];
                html += ' <td><select class="kasir-staff">' + staffData.kasir.map(n => `<option value="${n}" ${n === s.name ? 'selected' : ''}>${n}</option>`).join('') + '</select></td>';
                html += '<td><input type="time" value="' + s.checkIn + '"></td>';
                html += '<td><input type="time" value="' + s.checkOut + '"></td>';
                html += '<td>' + s.jadwal + '</td> </tr>';
            }
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function markFinePaid(name) {
            if (fineData[name] && !fineData[name].paid) {
                Swal.fire({
                    title: 'Konfirmasi',
                    text: 'Denda ' + fineData[name].amount + ' Bath untuk ' + name + ' sudah dibayar?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'Ya, Sudah Dibayar'
                }).then(function(result) {
                    if (result.isConfirmed) {
                        fineData[name].paid = true;
                        saveData();
                        renderAttendanceTable();
                        Swal.fire('Sukses!', 'Denda telah dibayar', 'success');
                    }
                });
            }
        }

        function switchPage(pageId) {
            const pages = ['attendance', 'shiftKapten', 'shiftKasir'];
            for (let i = 0; i < pages.length; i++) {
                const el = document.getElementById(pages[i] + 'Page');
                if (el) el.style.display = (pages[i] === pageId) ? 'block' : 'none';
            }
            const titles = { attendance: 'Jadwal Absen Staff', shiftKapten: 'SIFT KAPTEN', shiftKasir: 'SIFT KASIR' };
            document.getElementById('pageTitle').innerHTML = titles[pageId] || 'Jadwal Absen Staff';
            if (pageId === 'attendance') renderAttendanceTable();
            if (pageId === 'shiftKapten') renderShiftKapten();
            if (pageId === 'shiftKasir') renderShiftKasir();
        }

        function initTheme() {
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                const btns = document.querySelectorAll('#themeToggle, #themeToggleFloat');
                for (let i = 0; i < btns.length; i++) btns[i].innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            const btns = document.querySelectorAll('#themeToggle, #themeToggleFloat');
            for (let i = 0; i < btns.length; i++) btns[i].innerHTML = icon;
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = 'index.html';
        }

        function createGlitterParticles() {
            const sidebar = document.querySelector('.sidebar');
            if (!sidebar) return;
            const old = sidebar.querySelectorAll('.glitter-particle');
            for (let i = 0; i < old.length; i++) old[i].remove();
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'glitter-particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                const s = Math.random() * 3 + 1;
                p.style.width = s + 'px';
                p.style.height = s + 'px';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                sidebar.appendChild(p);
            }
        }

        function createCursorNeon() {
            const cursor = document.createElement('div');
            cursor.className = 'cursor-neon';
            document.body.appendChild(cursor);
            document.addEventListener('mousemove', function(e) {
                cursor.style.left = (e.clientX - 15) + 'px';
                cursor.style.top = (e.clientY - 15) + 'px';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            checkSession();
            initData();
            initTheme();
            renderAttendanceTable();
            createCursorNeon();
            setTimeout(createGlitterParticles, 500);
            
            const menuItems = document.querySelectorAll('.menu-item');
            for (let i = 0; i < menuItems.length; i++) {
                menuItems[i].addEventListener('click', function() {
                    const page = this.getAttribute('data-page');
                    if (page) switchPage(page);
                    for (let j = 0; j < menuItems.length; j++) menuItems[j].classList.remove('active');
                    this.classList.add('active');
                });
            }
            
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) logoutBtn.addEventListener('click', logout);
            const logoutTopBtn = document.getElementById('logoutTopBtn');
            if (logoutTopBtn) logoutTopBtn.addEventListener('click', logout);
            
            const themeToggle = document.getElementById('themeToggle');
            if (themeToggle) themeToggle.addEventListener('click', toggleTheme);
            const themeToggleFloat = document.getElementById('themeToggleFloat');
            if (themeToggleFloat) themeToggleFloat.addEventListener('click', toggleTheme);
            
            const updateKapten = document.getElementById('updateKaptenSchedule');
            if (updateKapten) updateKapten.addEventListener('click', renderShiftKapten);
            const updateKasir = document.getElementById('updateKasirSchedule');
            if (updateKasir) updateKasir.addEventListener('click', renderShiftKasir);
            
            const mobileBtn = document.getElementById('mobileMenuBtn');
            const sidebar = document.querySelector('.sidebar');
            if (mobileBtn && sidebar) {
                mobileBtn.addEventListener('click', function() { sidebar.classList.toggle('open'); });
            }
        });
        
        window.markFinePaid = markFinePaid;
    </script>
</body>
</html>
