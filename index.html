<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Staff Attendance System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HALAMAN LOGIN -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="logo-icon">
                <i class="fas fa-users"></i>
            </div>
            <h1>Staff Attendance System</h1>
            <p class="subtitle">Premium Management System</p>
            
            <div class="input-group-login">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email" autocomplete="off">
            </div>
            <div class="input-group-login">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            
            <div id="loginError" class="error-msg"></div>
            
            <button class="login-btn" id="loginButton">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            
            <div class="demo-info">
                <i class="fas fa-info-circle"></i> Demo Account:<br>
                <strong>master@attendance.com</strong> / master123<br>
                <strong>cs@attendance.com</strong> / cs123<br>
                <strong>kapten@attendance.com</strong> / kapten123
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
