<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Staff Attendance System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="glitterCanvas" class="glitter-canvas"></canvas>
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <div class="logo-icon"><img src="assets/logo.png" alt="Logo"></div>
            <h1>YOWES TOGEL</h1>
            <p class="subtitle">Yowes Management System</p>
            <div class="input-group-login">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Email">
            </div>
            <div class="input-group-login">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <div id="loginError" class="error-msg"></div>
            <button class="login-btn" id="loginButton">Login</button>
        </div>
    </div>
    <script>
        // Background glitter merah
        const canvas = document.getElementById('glitterCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 200;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles() {
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.2,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5 + 0.2,
                });
            }
        }

        function drawGlitter() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 51, 102, ${p.alpha})`;
                ctx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            }
            requestAnimationFrame(drawGlitter);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            particles = [];
            createParticles();
        });
        resizeCanvas();
        createParticles();
        drawGlitter();

        // Login logic
        const users = [
            { email: "master@attendance.com", password: "master123", role: "master", fullname: "Master Admin" },
            { email: "cs@attendance.com", password: "cs123", role: "cs", fullname: "CS User" },
            { email: "kapten@attendance.com", password: "kapten123", role: "kapten", fullname: "Kapten User" }
        ];

        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';
            if (!email || !password) {
                errorDiv.innerHTML = '⚠️ Email dan password harus diisi!';
                errorDiv.style.display = 'block';
                return;
            }
            const user = users.find(u => u.email === email && u.password === password);
            if (!user) {
                errorDiv.innerHTML = '⚠️ Email atau password salah!';
                errorDiv.style.display = 'block';
                document.getElementById('loginPassword').value = '';
                return;
            }
            sessionStorage.setItem('currentUser', JSON.stringify(user));
            if (user.role === 'master') window.location.href = 'dashboard-master.html';
            else if (user.role === 'cs') window.location.href = 'dashboard-cs.html';
            else if (user.role === 'kapten') window.location.href = 'dashboard-kapten.html';
        }

        document.getElementById('loginButton').addEventListener('click', handleLogin);
        document.getElementById('loginPassword').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
        document.getElementById('loginEmail').addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
